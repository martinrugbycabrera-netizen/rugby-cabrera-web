<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rugby Cabrera | Inicio</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fuente -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      scroll-behavior: smooth;
    }
    .club-bg-dark { background-color: #0f172a; }
    .club-text-accent { color: #dc2626; }
    .lang-btn {
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      border-radius: 0.375rem;
      cursor: pointer;
    }
    .lang-btn.active {
      background-color: rgba(220,38,38,0.15);
      color: #dc2626;
    }
    .lang-btn.inactive {
      color: #9ca3af;
    }
  </style>
</head>

<body class="antialiased">

<!-- HEADER -->
<header id="main-header" class="club-bg-dark text-white sticky top-0 z-50 shadow-lg">
  <nav class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">

    <!-- LOGO -->
    <div class="flex items-center gap-3">
      <div class="bg-white rounded-full p-1">
        <img src="assets/logo-cabrera.png"
             alt="Rugby Cabrera"
             class="h-8 w-8 sm:h-10 sm:w-10 object-contain" />
      </div>
      <span class="text-2xl font-bold club-text-accent">RUGBY CABRERA</span>
    </div>

    <!-- NAV -->
    <div class="hidden md:flex gap-8 text-lg">
      <a href="#inicio" data-i18n="nav-home">Inicio</a>
      <a href="#equipos" data-i18n="nav-teams">Equipos</a>
      <a href="#partidos" data-i18n="nav-matches">Partidos</a>
      <a href="#noticias" data-i18n="nav-news">Noticias</a>
      <a href="#contacto" data-i18n="nav-contact">Contacto</a>
    </div>

    <!-- IDIOMAS -->
    <div class="flex gap-2">
      <button class="lang-btn active" data-lang="es">ES</button>
      <button class="lang-btn inactive" data-lang="ca">CAT</button>
    </div>
  </nav>
</header>

<main>

<!-- HERO -->
<section id="inicio" class="h-[70vh] flex items-center justify-center text-center text-white bg-cover bg-center"
  style="background-image:url('https://placehold.co/1920x800/1e3a8a/ffffff?text=RUGBY+CABRERA')">
  <div class="bg-black/60 p-10 rounded-xl">
    <h1 class="text-5xl font-extrabold club-text-accent mb-4" data-i18n="hero-title">
      MÁS QUE UN JUEGO. ES RUGBY CABRERA.
    </h1>
    <p class="text-xl" data-i18n="hero-subtitle">
      Únete a nuestra pasión. Descubre nuestros valores.
    </p>
  </div>
</section>

<!-- EQUIPOS -->
<section id="equipos" class="py-20 club-bg-dark text-white text-center">
  <h2 class="text-4xl font-bold club-text-accent mb-10" data-i18n="teams-title">
    Nuestros Equipos de Cantera
  </h2>
</section>

<!-- PARTIDOS -->
<section id="partidos" class="py-20 bg-white text-center">
  <h2 class="text-4xl font-bold mb-10" data-i18n="match-title">Próximo Partido</h2>
</section>

<!-- SECCIÓN NOTICIAS -->
<section id="noticias" class="py-16 club-bg-dark text-white">
  <div class="max-w-7xl mx-auto px-4 text-center">

    <h2 class="text-4xl font-bold club-text-accent mb-12" data-i18n="news-title">
      Últimas Noticias
    </h2>

    <div id="news-wrapper" class="grid grid-cols-1 md:grid-cols-3 gap-10 text-left">
      <div id="news-cat-1" class="space-y-6"></div>
      <div id="news-cat-2" class="space-y-6"></div>
      <div id="news-cat-3" class="space-y-6"></div>
    </div>

  </div>
</section>

<!-- CONTACTO -->
<section id="contacto" class="py-20 bg-white text-center">
  <h2 class="text-4xl font-bold mb-4" data-i18n="contact-title">
    ¿Quieres ser parte de Rugby Cabrera?
  </h2>
</section>

</main>

<!-- FOOTER -->
<footer class="club-bg-dark text-white py-8 text-center">
  <p class="text-sm">© 2025 Rugby Cabrera</p>
</footer>

<!-- TRADUCCIONES -->
<script>
const translations = {
  es: {
    "nav-home": "Inicio",
    "nav-teams": "Equipos",
    "nav-matches": "Partidos",
    "nav-news": "Noticias",
    "nav-contact": "Contacto",
    "hero-title": "MÁS QUE UN JUEGO. ES RUGBY CABRERA.",
    "hero-subtitle": "Únete a nuestra pasión. Descubre nuestros valores.",
    "teams-title": "Nuestros Equipos de Cantera",
    "match-title": "Próximo Partido",
    "news-title": "Últimas Noticias",
    "contact-title": "¿Quieres ser parte de Rugby Cabrera?"
  },
  ca: {
    "nav-home": "Inici",
    "nav-teams": "Equips",
    "nav-matches": "Partits",
    "nav-news": "Notícies",
    "nav-contact": "Contacte",
    "hero-title": "MÉS QUE UN JOC. ÉS RUGBY CABRERA.",
    "hero-subtitle": "Uneix-te a la nostra passió. Descobreix els nostres valors.",
    "teams-title": "Els Nostres Equips de Cantera",
    "match-title": "Pròxim Partit",
    "news-title": "Últimes Notícies",
    "contact-title": "Vols formar part de Rugby Cabrera?"
  }
};

function changeLanguage(lang) {
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const key = el.getAttribute("data-i18n");
    if (translations[lang] && translations[lang][key]) {
      el.textContent = translations[lang][key];
    }
  });

  document.querySelectorAll(".lang-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.lang === lang);
    btn.classList.toggle("inactive", btn.dataset.lang !== lang);
  });

  localStorage.setItem("preferredLanguage", lang);
}
</script>
  <script>
document.addEventListener("DOMContentLoaded", () => {
  const savedLang = localStorage.getItem("preferredLanguage") || "es";
  changeLanguage(savedLang);
});
</script>

<!-- NOTICIAS DESDE GOOGLE SHEETS -->
<script>
const SHEET_URL =
"https://docs.google.com/spreadsheets/d/1yVuH3kAm5f-uNI4jFL5Ypl2ehPaRZRVabmG98EJnU7I/gviz/tq?tqx=out:json";

async function cargarNoticias() {
  const res = await fetch(SHEET_URL);
  const raw = await res.text();
  const json = JSON.parse(raw.substring(47, raw.length - 2));
  const rows = json.table.rows.map(r => r.c.map(c => c ? c.v : ""));
  const lang = localStorage.getItem("preferredLanguage") || "es";

  const noticias = rows.map(r => ({
    id: Number(r[0]),
    fecha: r[1],
    seccion: lang === "ca" ? r[5] : r[2],
    titulo: lang === "ca" ? r[6] : r[3],
    texto: lang === "ca" ? r[7] : r[4]
  }));

  ["1","2","3"].forEach(i =>
    document.getElementById("news-cat-"+i).innerHTML = ""
  );

  noticias.sort((a,b)=>new Date(b.fecha)-new Date(a.fecha))
    .forEach(n => {
      const card = `
      <div class="bg-slate-800 p-6 rounded-xl shadow w-full">
        <p class="text-xs text-gray-400 mb-2">${n.fecha}</p>
        <h3 class="text-xl font-bold club-text-accent mb-2">${n.titulo}</h3>
        <p class="text-gray-300 mb-2">${n.texto}</p>
        <p class="text-sm italic text-gray-500">${n.seccion}</p>
      </div>`;
      document.getElementById("news-cat-"+n.id).innerHTML += card;
    });
}

cargarNoticias();
</script>

</body>
</html>
