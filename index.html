<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rugby Cabrera | Inicio</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
    body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
    .club-bg-dark { background-color: #0f172a; }
    .club-text-accent { color: #dc2626; }
    .lang-btn.active { color:#dc2626; font-weight:700; }
    .lang-btn.inactive { color:#9ca3af; }
  </style>
</head>

<body class="antialiased">

<header class="club-bg-dark text-white sticky top-0 z-50">
  <nav class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <div class="bg-white rounded-full p-1">
        <img src="assets/logo-cabrera.png" class="h-8 w-8">
      </div>
      <span class="text-2xl font-bold club-text-accent">RUGBY CABRERA</span>
    </div>

    <div class="hidden md:flex gap-6">
      <a href="#inicio" data-i18n="nav-home">Inicio</a>
      <a href="#equipos" data-i18n="nav-teams">Equipos</a>
      <a href="#partidos" data-i18n="nav-matches">Partidos</a>
      <a href="#noticias" data-i18n="nav-news">Noticias</a>
      <a href="#contacto" data-i18n="nav-contact">Contacto</a>
    </div>

    <div class="flex gap-2">
      <button class="lang-btn active" data-lang="es">ES</button>
      <button class="lang-btn inactive" data-lang="ca">CAT</button>
    </div>
  </nav>
</header>

<main>

<section id="inicio" class="h-[65vh] flex items-center justify-center text-center bg-cover bg-center text-white"
  style="background-image:url('https://placehold.co/1920x800/1e3a8a/ffffff?text=RUGBY+CABRERA')">
  <div class="bg-black/60 p-8 rounded-xl">
    <h1 class="text-5xl font-extrabold club-text-accent mb-4" data-i18n="hero-title">
      MÁS QUE UN JUEGO. ES RUGBY CABRERA.
    </h1>
    <p class="text-xl" data-i18n="hero-subtitle">
      Únete a nuestra pasión. Descubre nuestros valores.
    </p>
  </div>
</section>

<section id="partidos" class="py-20 bg-white">
  <h2 id="match-section-title" class="text-4xl font-bold text-center mb-12 club-text-accent"></h2>

  <div class="max-w-3xl mx-auto rounded-3xl overflow-hidden shadow-xl">
    <div class="club-bg-dark py-12 text-center">
      <h3 id="match-title" class="text-5xl font-bold text-white mb-2"></h3>
      <p id="match-subtitle" class="text-xl text-gray-200"></p>
    </div>

    <div class="py-10 text-center space-y-3">
      <p>📅 <span id="match-date"></span></p>
      <p>⏰ <span id="match-time"></span></p>
      <p>📍 <span id="match-place"></span></p>
    </div>

    <div class="bg-red-600 py-4 text-center text-white font-bold">
      Entrada gratis
    </div>
  </div>
</section>

<section id="noticias" class="py-20 club-bg-dark text-white">
  <h2 class="text-4xl font-bold text-center mb-12 club-text-accent" data-i18n="news-title">
    Últimas Noticias
  </h2>
  <div id="news-wrapper" class="max-w-6xl mx-auto grid md:grid-cols-3 gap-8 px-6"></div>
</section>

<section id="contacto" class="py-20 bg-white text-center">
  <h2 class="text-3xl font-bold mb-4" data-i18n="contact-title">
    ¿Quieres ser parte de Rugby Cabrera?
  </h2>
</section>

</main>

<footer class="club-bg-dark text-white py-8 text-center">
  © 2025 Rugby Cabrera
</footer>

<!-- IDIOMAS -->
<script>
const translations = {
  es: {
    "nav-home":"Inicio","nav-teams":"Equipos","nav-matches":"Partidos","nav-news":"Noticias","nav-contact":"Contacto",
    "hero-title":"MÁS QUE UN JUEGO. ES RUGBY CABRERA.","hero-subtitle":"Únete a nuestra pasión. Descubre nuestros valores.",
    "news-title":"Últimas Noticias","contact-title":"¿Quieres ser parte de Rugby Cabrera?"
  },
  ca: {
    "nav-home":"Inici","nav-teams":"Equips","nav-matches":"Partits","nav-news":"Notícies","nav-contact":"Contacte",
    "hero-title":"MÉS QUE UN JOC. ÉS RUGBY CABRERA.","hero-subtitle":"Uneix-te a la nostra passió. Descobreix els nostres valors.",
    "news-title":"Últimes Notícies","contact-title":"Vols formar part de Rugby Cabrera?"
  }
};

function changeLanguage(lang){
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const k = el.dataset.i18n;
    if(translations[lang][k]) el.textContent = translations[lang][k];
  });
  document.querySelectorAll(".lang-btn").forEach(b=>{
    b.classList.toggle("active", b.dataset.lang===lang);
    b.classList.toggle("inactive", b.dataset.lang!==lang);
  });
  localStorage.setItem("preferredLanguage", lang);
}

document.querySelectorAll(".lang-btn").forEach(b=>{
  b.addEventListener("click",()=>changeLanguage(b.dataset.lang));
});

changeLanguage(localStorage.getItem("preferredLanguage")||"es");
</script>

<!-- PRÓXIMO PARTIDO DESDE SHEETS (CSV) -->
<script>
const MATCH_SHEET_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vSKDn3GJy4hXjEEWXf6Q_S2EPo23aVn3iTPMqCgTMGsbpcfI8rd9K2T8uvGcBYfWpeEfdf7roqlXtsY/pub?gid=0&single=true&output=csv";

async function cargarProximoPartido(){
  const lang=(localStorage.getItem("preferredLanguage")||"es").trim();
  const text=await (await fetch(MATCH_SHEET_URL)).text();
  const rows=text.trim().split("\n").slice(1).map(r=>r.split(";").map(c=>c.trim()));
  const row=rows.find(r=>r[0]===lang);
  if(!row) return;
  document.getElementById("match-section-title").textContent=row[1];
  document.getElementById("match-title").textContent=row[2];
  document.getElementById("match-subtitle").textContent=row[3];
  document.getElementById("match-date").textContent=row[4];
  document.getElementById("match-time").textContent=row[5];
  document.getElementById("match-place").textContent=row[6];
}

document.addEventListener("DOMContentLoaded", cargarProximoPartido);
document.querySelectorAll(".lang-btn").forEach(b=>{
  b.addEventListener("click",()=>setTimeout(cargarProximoPartido,50));
});
</script>

</body>
</html>
